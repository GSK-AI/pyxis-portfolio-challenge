name: Test & Lint
on:
    push:
        branches:
        - main
    pull_request:
        branches:
        - main

permissions:
  contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version-file: ".python-version"

        - name: Install uv
          uses: astral-sh/setup-uv@v6

        - name: UV Sync
          run: uv sync --extra dev --extra app

        - name: Run tests
          run: |
            uv run pytest -s

        - name: Lint code
          run: |
            uv run ruff check .
