files: '^(app|aiml_pyxis_investment_game|asset_gen|scripts)\/\S*'
repos:
- repo: local
  hooks:
  - id: ruff format
    name: ruff format
    stages: [pre-commit]
    language: system
    entry: ruff format .
    types: [python]

  - id: ruff check fix
    name: ruff check fix
    stages: [pre-commit]
    language: system
    entry: ruff check . --fix
    types: [python]
