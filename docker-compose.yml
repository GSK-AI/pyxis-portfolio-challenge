version: '3.8'

services:
  # Redis cache for game state
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      # Redis configuration
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_REDIS_DB: 0
      APP_USE_LOCAL_REDIS: "true"
      # Local game assets
      APP_GAME_ASSETS_DIR: /app/rl-environment-assets/gpt5_09feb2026_highPtrs/training
    volumes:
      # Mount source code for development (hot reload)
      - ./aiml_pyxis_investment_game:/app/aiml_pyxis_investment_game:ro
      - ./app:/app/app:ro
      # Mount RL environment assets
      - ./rl-environment-assets:/app/rl-environment-assets:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: linux_dockerfile_fe
      args:
        NEXT_PUBLIC_BACKEND_URL_GAME: http://localhost:8000
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
        NEXT_PUBLIC_AZURE_CLIENT_ID: ""
        NEXT_PUBLIC_AZURE_AUTHORITY: ""
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL_GAME: http://localhost:8000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
