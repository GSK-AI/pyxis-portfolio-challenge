version: '3.8'

services:
  # Redis cache for game state
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL database for game metrics
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pyxis
      POSTGRES_PASSWORD: pyxis_dev
      POSTGRES_DB: pyxis_game
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyxis -d pyxis_game"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      # Redis configuration
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_REDIS_DB: 0
      APP_USE_LOCAL_REDIS: "true"
      # Disable Azure auth for local development
      APP_DISABLE_AUTH_MIDDLEWARE: "true"
      # Use local SQLite for development (simpler than connecting to postgres)
      TESTING: "1"
      PORTFOLIO_DB_PATH: /app/data/game_metrics.db
      # Local game assets
      APP_GAME_ASSETS_DIR: /app/asset_gen/o3_take3
    volumes:
      # Mount data directory for SQLite persistence
      - backend_data:/app/data
      # Mount source code for development (hot reload)
      - ./aiml_pyxis_investment_game:/app/aiml_pyxis_investment_game:ro
      - ./app:/app/app:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: linux_dockerfile_fe
      args:
        NEXT_PUBLIC_BACKEND_URL_GAME: http://localhost:8000
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
        NEXT_PUBLIC_AZURE_CLIENT_ID: ""
        NEXT_PUBLIC_AZURE_AUTHORITY: ""
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL_GAME: http://localhost:8000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  backend_data:
