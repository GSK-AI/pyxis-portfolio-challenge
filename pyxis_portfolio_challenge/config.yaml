# this config serves as a place to fix the train and eval environment parameters for the published game
# Gym environment initialization parameters - 40 assets for complexity test
equilibrium_num_assets: 35
max_num_assets: 40
asset_arrival_sensitivity_below: 2.0
asset_arrival_sensitivity_above: 2.0
starting_cash: 10e9
horizon: 100
reinvestment_percentage: 0.15
trial_cost_multiplier: 1.0        # Scales all trial phase costs (>1 = more expensive trials)
shuffle_order: false
mask_first_order_assets: true
mask_negative_enpv_assets: false
auto_center_rewards: false
auto_center_calibration_steps: 10_000
flatten_obs: true
warmup_on_reset_steps: 0
warmup_on_reset_policy: do_nothing
reward_fn:
  _target_: pyxis_portfolio_challenge.environment.reward.NetCashFlowReward

# Training parameters
training_data_dir: rl-environment-assets/gpt5_09feb2026_highPtrs/training

# Evaluation parameters
evaluation_data_dir: rl-environment-assets/gpt5_09feb2026_highPtrs/evaluation
eval_initial_seed: 891024889
num_eval_episodes: 100
evaluation_metrics:
  # Overall performance
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerEvaluationCumulativeReward
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerEvaluationBankruptcyRate
  # Per-episode outcomes
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerEpisodeCumulativeReward
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerEpisodeRealisedRoi
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerEpisodeFinalEnpv
  # Per-step trajectories
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerStepCash
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerStepRevenue
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerStepCost
  # Pipeline shape
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerStepNumAssetsIdleState
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerStepNumAssetsInDevelopmentState
  - _target_: pyxis_portfolio_challenge.environment.metrics.PerStepNumAssetsOnMarketState
  # Multi-agent competitive position
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerStepAgentRank
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerStepRelativeEnpv
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerStepMeanMarketShare
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerStepDrugsOnMarket
  # Multi-agent outcomes
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerEpisodeWinLoss
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerEpisodeBDDealsWon
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerEpisodeFirstMoverRate
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerEpisodeRevenueLostToCompetition
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerEpisodeInvestmentPnL
  - _target_: pyxis_portfolio_challenge.environment.multi_agent_metrics.PerEpisodeAssetLifecycle


# Pyxie agent parameters
pyxie_model_root_path: az://saved-gym-agent

# Per-drug pricing — agents set price levels for on-market drugs
# Higher prices increase per-unit revenue but reduce market share via demand elasticity
pricing:
  enabled: false
  levels: [0.60, 0.75, 1.00, 1.20, 1.40, 1.60]   # Revenue multipliers per tier
  default_level: 2                                   # Index 2 = Standard (1.0x)
  elasticity: 2.0                                    # share ~ 1/price^elasticity (>1 = price cuts win)

# Multi-agent environment configuration
multi_agent:
  enabled: true  # Set to true to use multi-agent competitive environment
  num_agents: 2
  # BD market parameters (Poisson-distributed, event-driven)
  bd_enabled: true
  bd_assets_dir: rl-environment-assets/gpt5_09feb2026_highPtrs/training
  bd_base_lambda: 1.3                # Poisson λ: P(0)=27%, P(1)=35%, P(2)=23%, P(≥3)=14%
  bd_leak_lambda_boost: 0.3          # Added λ per recent leak in any indication
  bd_min_step: 0                     # No BD before this step
  bd_num_bid_levels: 11              # 0=pass, 1-10 = bid levels
  bd_break_even_bid_level: 7         # Level 7 = break-even (eNPV * reinvestment_pct); 8-10 overpay for strategic gain
  bd_max_slots: 3                    # Max BD assets per step
  bd_phase_weights: [0.2, 0.4, 0.4]  # Phase 1/2/3 sampling weights for BD assets
  bd_indication_activity_bias: 0.8   # Weight of activity vs uniform in indication sampling
  # Competition parameters
  exclusivity_period: 4
  first_mover_bonus: 0.30
  disable_market_share_competition: false
  # Intelligence parameters (event-driven leaks on phase transitions)
  alert_history_length: 5
  leak_phase_probabilities: [0.2, 0.5, 0.7]  # Phase 1→2, 2→3, 3→Approval
  alerts_per_agent: 5
  # Multi-agent reward type: "absolute", "relative_rank", "zero_sum"
  reward_type: absolute
  reward_scale: 1.0
  # Indication-based market segmentation
  # Controls how finely the market is segmented within each TA
  target_drugs_per_indication: 0.17  # Target number of competing drugs per indication
  on_market_fraction: 0.25          # Estimated fraction of portfolio that's on-market
  max_indications_per_ta: 4          # Hard cap for observation space sizing (4 × 3 TAs = 12 total)

  indication_spread: 1.33    # Absolute Gaussian sigma in indication-index units
  indication_drift_speed: 2       # How many times the hot zone sweeps through all indications per episode

  # Market congestion penalty: reduces revenue when many drugs compete in same indication
  congestion_exponent: 2.0           # α in 1/n^α (0 = disabled, 0.5 = moderate penalty)
  congestion_ramp_steps: 3              # Entry positions to reach full penalty (1 = binary incumbent/challenger)
  congestion_incumbent_penalty: 0.15    # Fraction of full penalty applied to incumbent (0 = fully protected)

# Approval phase - regulatory approval between Phase 3 and market entry
approval_phase:
  enabled: true
  duration_min: 1       # Min approval duration in steps
  duration_max: 3       # Max approval duration in steps
  success_rate_min: 0.85  # Min PTRS for approval
  success_rate_max: 0.95  # Max PTRS for approval
  cost: 50_000_000      # Filing fees

# TA Experience system - decoupled from PTRS features
# Can be used with uncertain_ptrs, distributional_ptrs, or standalone
ta_experience:
  enabled: false  # Master toggle for TA experience system

  # Experience system - aggressive decay to force specialization
  experience_to_full_knowledge: 30.0   # Very high bar for full knowledge
  max_expertise_boost: 0.05            # 5% PTRS boost for specialists
  experience_to_max_boost: 40.0
  experience_decay_rate: 0.98          # 2% decay per step
  max_total_experience: 60.0           # Hard cap on total experience (2x full knowledge)
                                       # Forces trade-off: specialist gets 100% in 1 TA,
                                       # generalist gets ~33% in each of 3 TAs

  # Phase experience weights - how much experience gained per trial phase completion
  phase_experience_weights:
    phase_1: 0.5
    phase_2: 1.0
    phase_3: 1.5
    approval: 0.5

  # Asset arrival bias - small bias toward experienced TAs
  asset_arrival_temperature: 0.1  # Small bias, rewards mild specialization

# Uncertain PTRS feature - adds Gaussian noise to point estimates
# NOTE: Mutually exclusive with distributional_ptrs
uncertain_ptrs:
  enabled: false

  # TA-specific base noise levels
  # These multiply with phase multipliers: effective_std = ta_noise * phase_mult
  # With typical PTRS in [0.3, 0.7], noise should be meaningful but not overwhelming
  ta_noise_config:
    oncology: 0.12                        # Highest noise (hardest to evaluate)
    respiratory and immunology: 0.10
    vaccines and infectious disease: 0.08  # Lowest noise (most predictable)

  # Phase noise multipliers (later phases have more data, so less noise)
  phase_noise_multipliers:
    phase_1: 1.5    # Early stage: least data, most uncertain
    phase_2: 1.0    # Mid stage: moderate uncertainty
    phase_3: 0.75   # Late stage: most data, least uncertain
    approval: 0.5   # Regulatory: very predictable

# R&D capacity constraints - standalone, independent of investment levels feature
# When enabled: each InDevelopment asset = 1 capacity unit (or per-level capacity_cost if investment_levels enabled)
# Overage penalties: when capacity_used > base_capacity
#   success_modifier = 1.0 - (overage_ratio * overage_max_penalty)
#   cost_modifier    = 1.0 + (overage_ratio * overage_cost_max_penalty)
#   where overage_ratio = (used - base) / base
rd_capacity:
  enabled: false
  base_capacity: 10  # Max simultaneous assets in development (with linear action space: 1 unit per asset)
  overage_max_penalty: 0.30  # At 2x capacity, success rates drop 30%
  overage_cost_max_penalty: 0.40  # At 2x capacity, costs increase 40%
  overage_scaling: linear  # "linear" or "quadratic"

# Investment levels feature - variable investment intensity
investment_levels:
  enabled: false  # Master toggle for investment levels feature

  # Investment level definitions
  # Each level affects: cost, speed, success probability, capacity usage, and experience gain
  levels:
    none:  # Not investing (for idle assets or pausing)
      cost_modifier: 0.0
      speed_modifier: 0.0
      success_modifier: 1.0
      capacity_cost: 0
      experience_modifier: 0.0
    minimal:  # Much slower and cheaper, better learning
      cost_modifier: 0.5
      speed_modifier: 0.5  # 2x slower
      success_modifier: 0.85
      capacity_cost: 1
      experience_modifier: 2.0
    standard:  # Normal development pace
      cost_modifier: 1.0
      speed_modifier: 1.0
      success_modifier: 1.0
      capacity_cost: 2
      experience_modifier: 1.0
    accelerated:  # Much faster but very expensive, minimal learning
      cost_modifier: 2.0
      speed_modifier: 2.0  # 2x faster
      success_modifier: 1.10
      capacity_cost: 4
      experience_modifier: 0.25

# Interim trial observations feature - noisy signals during trials enable early stopping
interim_trial_observations:
  enabled: false  # Disabled - mutually exclusive with distributional_ptrs
  latent_quality_concentration: 10.0  # Beta distribution concentration (higher = tighter around PTRS)
  initial_noise_scale: 0.3  # Initial noise in interim signals (decreases as trial progresses)

# Distributional PTRS feature - makes PTRS a distribution with correlated TA quality
# This introduces compound uncertainty that RL can learn but heuristics cannot optimize
#
# To use POINT-BASED PTRS instead: set enabled: false
# The game will then use the simple ptrs value directly (no distribution sampling)
# Note: mutually exclusive with interim_trial_observations
distributional_ptrs:
  enabled: false  # Set to false for point-based PTRS

  # Per-TA variance in quality modifier (hidden state sampled at episode start)
  # Higher variance = more uncertainty about TA quality
  ta_quality_variance:
    oncology: 0.08
    respiratory and immunology: 0.05
    vaccines and infectious disease: 0.03

  # Per-asset additional noise (independent of TA quality)
  asset_noise_std: 0.03

  # Prior concentration for Beta belief representation
  # Higher = tighter prior (more confident initial estimate)
  prior_concentration: 5.0

  # Observation noise for Bayesian updates (how much trial outcomes vary)
  observation_noise: 0.1
